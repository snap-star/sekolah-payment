# Psalm Security Scan for Laravel PHP Project
# This workflow scans your PHP codebase for security vulnerabilities using Psalm

name: Psalm Security Scan

on:
  push:
    branches: [ "master" ]
    paths:
      - 'backend/sekolahpay_server/**'
      - '.github/workflows/psalm.yml'
  pull_request:
    branches: [ "master" ]
    paths:
      - 'backend/sekolahpay_server/**'
      - '.github/workflows/psalm.yml'
  schedule:
    - cron: '00 6 * * 1'

permissions:
  contents: read

jobs:
  php-security:
    runs-on: ubuntu-latest
    permissions:
      contents: read # for actions/checkout to fetch code
      security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
      actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, json, fileinfo, pdo, mysql
          coverage: none

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress --no-suggest
        working-directory: backend/sekolahpay_server

      - name: Install Psalm globally
        run: |
          composer global require --dev vimeo/psalm psalm/psalm-plugin-laravel
          echo $HOME/.composer/vendor/bin >> $GITHUB_PATH

      - name: Initialize Psalm configuration
        run: |
          cd backend/sekolahpay_server
          psalm --init
          psalm-plugin enable psalm/psalm-plugin-laravel
        continue-on-error: true

      - name: Run Psalm Security Scan
        run: |
          cd backend/sekolahpay_server
          psalm --security-analysis --output sarif results.sarif

      - name: Move results to root
        run: mv backend/sekolahpay_server/results.sarif results.sarif

      - name: Upload Security Analysis results to GitHub
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif