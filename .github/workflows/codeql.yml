name: "CodeQL Analysis"

on:
  push:
    branches: [ "master" ]
    paths:
      - 'frontend/sekolahpay-frontend/**'
  pull_request:
    branches: [ "master" ]
    paths:
      - 'frontend/sekolahpay-frontend/**'
  schedule:
    - cron: '00 6 * * 6'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write # Required to post results to the Security tab
      packages: read         # Required if fetching internal/private CodeQL packs
      actions: read          # Required for private repos
      contents: read         # Required for checkout

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: autobuild
            working-directory: frontend/sekolahpay-frontend

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'pnpm'
        cache-dependency-path: frontend/sekolahpay-frontend/pnpm-lock.yaml

    - name: Install pnpm
      run: npm install -g pnpm

    - name: Install dependencies
      run: pnpm install
      working-directory: ${{ matrix.working-directory }}

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}

    - name: Build project
      run: pnpm run build
      working-directory: ${{ matrix.working-directory }}

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{matrix.language}}"